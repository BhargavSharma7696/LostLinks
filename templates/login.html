{% extends "base.html" %}

{% block title %}Sign In - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="relative w-full flex items-center justify-center min-h-[70vh] rounded-[32px]">
  <!-- Decorative background text -->
  <div class="absolute inset-0 hidden sm:block pointer-events-none select-none z-0 overflow-hidden rounded-[32px]">
    <div class="absolute top-1/2 right-[calc(50%+14rem)] lg:right-[calc(50%+16rem)] -translate-y-1/2">
      <span
        class="text-[6vw] lg:text-[7vw] xl:text-[7rem] font-black text-slate-900/[0.06] tracking-tighter whitespace-nowrap">
        LOST
      </span>
    </div>
    <div class="absolute top-1/2 left-[calc(50%+14rem)] lg:left-[calc(50%+16rem)] -translate-y-1/2">
      <span
        class="text-[6vw] lg:text-[7vw] xl:text-[7rem] font-black text-slate-900/[0.06] tracking-tighter whitespace-nowrap">
        LINKS
      </span>
    </div>
  </div>

  <div class="neo-card p-8 md:p-12 w-full max-w-md relative z-10 animate-fade-in-up">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-main mb-2" id="login-title">Sign In</h1>
      <p class="text-muted font-medium">Enter your credentials to access your account</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST" id="login-form" novalidate class="space-y-6">
      <!-- Email Input -->
      <div>
        <label for="email" class="block text-sm font-semibold text-main mb-2" id="label-email">Email
          Address</label>
        <input type="email" name="email" id="email"
          class="neo-input w-full text-main px-4 py-3"
          placeholder="name@iitbhilai.ac.in" required autocomplete="email" aria-labelledby="label-email">
      </div>

      <!-- Password Input -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <label for="password" class="block text-sm font-semibold text-main" id="label-password">Password</label>
          <a href="{{ url_for('forgot_password') }}"
            class="text-sm font-medium text-accent hover:opacity-80 transition"
            id="forgot-password-link">Forgot?</a>
        </div>
        <input type="password" name="password" id="password"
          class="neo-input w-full text-main px-4 py-3"
          placeholder="••••••••" required autocomplete="current-password" aria-labelledby="label-password">
      </div>

      <!-- Submit Button -->
      <button type="submit"
        class="neo-btn w-full text-accent font-bold px-4 py-3"
        id="login-submit-btn">
        Sign In
      </button>
    </form>

    <div class="text-center mt-6 text-muted font-medium text-sm">
      <p>Don't have an account? <a href="{{ url_for('signup') }}"
          class="text-accent font-bold hover:opacity-80 transition" id="signup-link">Sign Up</a></p>
    </div>
  </div>
</div>
{% endblock %}
