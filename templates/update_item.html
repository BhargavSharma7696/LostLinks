{% extends "base.html" %}

{% block title %}Update Listing - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-header">
    <h1 id="update-item-title">Update Listing</h1>
    <p>Modify the details of your reported {% if item.type == 'lost' %}lost{% else %}found{% endif %} item</p>
  </div>

  <form class="auth-form" action="{{ url_for('update_item', item_id=item.id) }}" method="POST" id="update-item-form" novalidate>
    <!-- Title Input -->
    <div class="form-group">
      <label for="title" class="form-label" id="label-title">Item Title / Name</label>
      <div class="input-wrapper">
        <input type="text" name="title" id="title" class="form-input"
          value="{{ item.title }}" aria-labelledby="label-title">
      </div>
    </div>

    <!-- Category Selector -->
    <div class="form-group">
      <label for="category" class="form-label" id="label-category">Category</label>
      <div class="input-wrapper">
        <select name="category" id="category" class="form-input" aria-labelledby="label-category">
          <option value="Electronics" {% if item.category == 'Electronics' %}selected{% endif %}>Electronics</option>
          <option value="Documents" {% if item.category == 'Documents' %}selected{% endif %}>Books & Documents</option>
          <option value="Keys/Wallets" {% if item.category == 'Keys/Wallets' %}selected{% endif %}>Keys & Wallets</option>
          <option value="Clothing" {% if item.category == 'Clothing' %}selected{% endif %}>Clothing</option>
          <option value="Accessories" {% if item.category == 'Accessories' %}selected{% endif %}>Accessories</option>
          <option value="Other" {% if item.category == 'Other' %}selected{% endif %}>Other</option>
        </select>
      </div>
    </div>

    <!-- Timing -->
    <div class="form-group">
      <label for="lost-time" class="form-label" id="label-lost-time">
        {% if item.type == 'lost' %}Lost Time{% else %}Found Time{% endif %}
      </label>
      <div class="input-wrapper">
        <input type="datetime-local" name="lost-time" id="lost-time" class="form-input"
          value="{{ item.losttime }}" aria-labelledby="label-lost-time">
      </div>
    </div>

    <!-- Location Input -->
    <div class="form-group">
      <label for="location" class="form-label" id="label-location">
        Location {% if item.type == 'lost' %}Lost{% else %}Found{% endif %}
      </label>
      <div class="input-wrapper">
        <input type="text" name="location" id="location" class="form-input"
          value="{{ item.location }}" aria-labelledby="label-location">
      </div>
    </div>

    <!-- Description Textarea -->
    <div class="form-group">
      <label for="description" class="form-label" id="label-description">Description & Details</label>
      <div class="input-wrapper">
        <textarea name="description" id="description" class="form-input" rows="4"
          aria-labelledby="label-description">{{ item.description }}</textarea>
      </div>
    </div>

    <!-- Photo Display (Read-Only) -->
    {% if item.photourl %}
    <div class="form-group" style="margin-top: 1.5rem; text-align: center;">
      <label class="form-label" style="text-align: left;">Listing Photo</label>
      <div class="image-preview-wrapper" style="margin-top: 0.5rem; border: 1px solid var(--border-color); padding: 0.5rem; border-radius: 12px; background: rgba(15, 23, 42, 0.4);">
        <img src="{{ item.photourl }}" alt="Item Photo" class="photo-preview-img" style="max-height: 180px; width: auto; object-fit: cover; border-radius: 8px;">
        <p style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem; letter-spacing: 0.5px;">Photo cannot be updated</p>
      </div>
    </div>
    {% endif %}

    <!-- Submit Button -->
    <button type="submit" class="btn-primary" id="update-item-submit-btn" style="margin-top: 1.5rem;">
      Save Modifications
    </button>
  </form>
</div>
{% endblock %}
