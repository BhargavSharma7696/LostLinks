{% extends "base.html" %}

{% block title %}Update Profile - 🔗 LostLinks{% endblock %}

{% block content %}

<div class="auth-container">
  <div class="auth-header">
    <h1 id="profile-title">Update Profile</h1>
    <p>Update your profile information</p>
  </div>
  {% if user %}
  <form class="auth-form" action="{{ url_for('update_profile') }}" method="POST">
    <div class="form-group">
      <label for="displayName">Display Name</label>
      <input type="text" id="displayName" name="displayName" value="{{ user.displayName }}" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" value="{{ user.email }}" readonly>
    </div>
    <div class="form-group">
      <label for="contactNumber">Contact Number</label>
      <input type="text" id="contactNumber" name="contactNumber" value="{{ user.contactNumber }}">
    </div>
    <button type="submit" class="btn-primary">Update Profile Info</button>
  </form>
  {% else %}
    <p>User profile not found.</p>
  {% endif %}
</div>

{% endblock %}
