{% extends "base.html" %}

{% block title %}Reset Password - 🔗 LostLinks{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-header">
    <h1 id="forgot-title">Reset Password</h1>
    <p>We'll send a password recovery link to your email</p>
  </div>

  <form action="{{ url_for('forgot_password') }}" method="POST" id="forgot-form" novalidate>
    <!-- Email Input -->
    <div class="form-group">
      <label for="email" class="form-label" id="label-email">Email Address</label>
      <div class="input-wrapper">
        <input 
          type="email" 
          name="email" 
          id="email" 
          class="form-input" 
          placeholder="name@iitbhilai.ac.in" 
          required 
          autocomplete="email"
          aria-labelledby="label-email"
        >
      </div>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn-primary" id="forgot-submit-btn">
      Send Recovery Link
    </button>
  </form>

  <div class="auth-footer">
    <p>Remember your password? <a href="{{ url_for('login') }}" id="login-link">Sign In</a></p>
  </div>
</div>
{% endblock %}
